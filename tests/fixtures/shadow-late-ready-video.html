<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shadow Late Ready Video</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    video {
      width: 480px;
      max-width: 100%;
      border-radius: 8px;
      background: #111;
    }
  </style>
</head>
<body>
  <div id="host"></div>
  <div id="churn"></div>

  <script>
    const host = document.getElementById('host');
    const churn = document.getElementById('churn');
    const root = host.attachShadow({ mode: 'open' });
    const video = document.createElement('video');
    video.id = 'shadow-late-ready-video';
    video.muted = true;
    video.autoplay = true;
    video.playsInline = true;
    root.appendChild(video);

    let tick = 0;
    window.__shadow_late_ready_tick__ = 0;
    setInterval(() => {
      tick += 1;
      const span = document.createElement('span');
      span.textContent = String(tick);
      churn.replaceChildren(span);
      window.__shadow_late_ready_tick__ = tick;
    }, 100);

    async function startGeneratedStream() {
      const canvas = document.createElement('canvas');
      canvas.width = 640;
      canvas.height = 360;
      const context = canvas.getContext('2d');
      if (!context || typeof canvas.captureStream !== 'function') return false;

      const startedAt = Date.now();
      const draw = () => {
        const elapsed = Date.now() - startedAt;
        context.fillStyle = `hsl(${Math.floor((elapsed / 20) % 360)}, 70%, 55%)`;
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.fillStyle = '#fff';
        context.font = 'bold 36px sans-serif';
        context.fillText('Shadow Late Ready', 32, 72);
        requestAnimationFrame(draw);
      };
      draw();

      video.srcObject = canvas.captureStream(30);
      await video.play();
      window.__shadow_late_ready_started__ = true;
      return true;
    }

    setTimeout(() => {
      startGeneratedStream().catch(() => {});
    }, 800);
  </script>
</body>
</html>
