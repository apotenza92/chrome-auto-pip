<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delayed Video</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: sans-serif;
        background: #f5f5f5;
      }
      video {
        width: 480px;
        max-width: 100%;
        border-radius: 8px;
        background: #111;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script>
      async function startGeneratedStream(video) {
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 360;
        const context = canvas.getContext('2d');
        if (!context || typeof canvas.captureStream !== 'function') return false;

        const startedAt = Date.now();
        const draw = () => {
          const elapsed = Date.now() - startedAt;
          const hue = Math.floor((elapsed / 20) % 360);
          context.fillStyle = `hsl(${hue}, 70%, 55%)`;
          context.fillRect(0, 0, canvas.width, canvas.height);
          context.fillStyle = '#ffffff';
          context.font = 'bold 36px sans-serif';
          context.fillText('Delayed Auto PiP', 32, 72);
          context.font = '24px sans-serif';
          context.fillText('Dynamic player fixture', 32, 118);
          requestAnimationFrame(draw);
        };
        draw();

        video.srcObject = canvas.captureStream(30);
        video.muted = true;
        video.playsInline = true;
        await video.play();
        return true;
      }

      setTimeout(() => {
        const video = document.createElement('video');
        video.id = 'delayed-video';
        video.muted = true;
        video.autoplay = true;
        video.playsInline = true;
        document.getElementById('player').appendChild(video);
        startGeneratedStream(video).catch(() => {});
      }, 800);
    </script>
  </body>
</html>
